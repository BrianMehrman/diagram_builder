version: '3.9'

# Profiles:
#   infra        - Neo4j + Redis (local dev default)
#   app          - API + UI containers (built from Dockerfiles)
#   observability - Jaeger + Prometheus + Grafana (added in Story 12-4)
#
# Usage:
#   docker compose --profile infra up -d               # infra only
#   docker compose --profile infra --profile app up -d # full stack
#   docker compose --profile infra --profile app --profile observability up -d # everything

services:
  # ─── infra profile ──────────────────────────────────────────────────────────
  neo4j:
    profiles: [infra]
    image: neo4j:latest
    container_name: diagram-builder-neo4j
    ports:
      - '7474:7474'  # HTTP
      - '7687:7687'  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - diagram-builder-network
    restart: unless-stopped

  redis:
    profiles: [infra]
    image: redis:7.4-alpine
    container_name: diagram-builder-redis
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - diagram-builder-network
    restart: unless-stopped

  # ─── app profile ────────────────────────────────────────────────────────────
  api:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: diagram-builder-api
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    depends_on:
      - neo4j
      - redis
    ports:
      - '3000:3000'
    networks:
      - diagram-builder-network
    restart: unless-stopped

  ui:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
    container_name: diagram-builder-ui
    depends_on:
      - api
    ports:
      - '5173:80'
    networks:
      - diagram-builder-network
    restart: unless-stopped

  # ─── observability profile ──────────────────────────────────────────────────
  # Jaeger, Prometheus, and Grafana are added in Story 12-4.

volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:

networks:
  diagram-builder-network:
    driver: bridge
