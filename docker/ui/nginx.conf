server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-XSS-Protection      "1; mode=block"               always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Cache immutable Vite-hashed assets aggressively
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy REST API requests to the API service.
    # The service name "api" resolves via Docker Compose / Kubernetes DNS.
    location /api/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy Socket.IO — requires WebSocket upgrade headers and a long timeout.
    location /socket.io/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Hold WebSocket connections open for up to 24 hours
        proxy_read_timeout 86400s;
    }

    # SPA fallback — serve index.html for all unmatched routes so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
