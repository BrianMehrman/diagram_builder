service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger_storage_exporter]

extensions:
  jaeger_storage:
    backends:
      memstore:
        memory:
          max_traces: 100000
  jaeger_query:
    storage:
      traces: memstore

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          # Wildcard is intentional for local development where the UI origin varies.
          # Restrict to specific origins (e.g. https://your-app.example.com) in production.
          allowed_origins:
            - "*"

processors:
  batch:

exporters:
  jaeger_storage_exporter:
    trace_storage: memstore
