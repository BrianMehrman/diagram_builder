global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: diagram-builder-api
    static_configs:
      - targets: ['host.docker.internal:9464']
    metrics_path: /metrics

  - job_name: diagram-builder-parser
    static_configs:
      - targets: ['host.docker.internal:9465']
    metrics_path: /metrics
