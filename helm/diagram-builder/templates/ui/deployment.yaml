apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "diagram-builder.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "diagram-builder.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "diagram-builder.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "diagram-builder.ui.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
