apiVersion: v1
kind: Service
metadata:
  name: {{ include "diagram-builder.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "diagram-builder.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.ui.service.type "NodePort") .Values.ui.service.nodePort }}
      nodePort: {{ .Values.ui.service.nodePort }}
      {{- end }}
  selector:
    {{- include "diagram-builder.ui.selectorLabels" . | nindent 4 }}
