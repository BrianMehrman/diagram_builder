apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "diagram-builder.fullname" . }}-api-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "diagram-builder.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
data:
  NODE_ENV: {{ .Values.api.config.nodeEnv | quote }}
  LOG_LEVEL: {{ .Values.api.config.logLevel | quote }}
  PORT: "8741"
  OTEL_ENABLED: {{ .Values.api.config.otelEnabled | quote }}
  OTEL_SERVICE_NAME: {{ .Values.api.config.otelServiceName | quote }}
  OTEL_SERVICE_VERSION: {{ .Values.api.config.otelServiceVersion | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ include "diagram-builder.fullname" . }}-opentelemetry-collector:4317"
  CORS_ORIGIN: {{ .Values.api.config.corsOrigin | quote }}
  NEO4J_URI: "bolt://{{ .Release.Name }}-neo4j:7687"
  REDIS_HOST: "{{ .Release.Name }}-redis-master"
  REDIS_PORT: "6379"
