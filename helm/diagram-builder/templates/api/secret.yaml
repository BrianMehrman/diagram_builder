apiVersion: v1
kind: Secret
metadata:
  name: {{ include "diagram-builder.fullname" . }}-api-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "diagram-builder.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
data:
  JWT_SECRET: {{ .Values.api.secrets.jwtSecret | b64enc | quote }}
  NEO4J_PASSWORD: {{ .Values.api.secrets.neo4jPassword | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.api.secrets.redisPassword | b64enc | quote }}
